name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # 运行测试
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  # 部署前端到 Cloudflare Pages
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_API_BASE_URL: https://slr-system-api.onrender.com

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html || exit 1
          test -f dist/_redirects || echo "Warning: _redirects not found"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=slr-system

  # 部署状态通知
  notify:
    name: Notify Deployment Status
    needs: [deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ 部署成功！"
            echo "前端: https://slr-system.pages.dev/"
            echo "后端 API: https://slr-system-api.onrender.com"
          else
            echo "❌ 部署失败，请检查日志"
            exit 1
          fi
