services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-uploads:
